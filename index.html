<!doctype html>

<html lang="es">  
<head>  
<meta charset="utf-8" />  
<meta name="viewport" content="width=device-width,initial-scale=1" />  
<title>Picks NFL — Semanal</title>  <style>  
  :root {  
    --bg: #1c1c1c;        /* gris Oxford */  
    --panel: #2b2b2b;  
    --muted: #aeb7bf;  
    --accent1: #013369;   /* azul NFL */  
    --accent2: #d50a0a;   /* rojo NFL */  
  }  
  
  body {  
    margin:0;  
    font-family: Arial, Helvetica, sans-serif;  
    background: var(--bg);  
    color: #fff;  
  }  
  
  /* ░░░ BARRA SUPERIOR ░░░ */  
  header {  
    background: linear-gradient(to right, var(--accent1), var(--accent2));  
    display:flex;  
    align-items:center;  
    justify-content:space-between;  
    padding:10px 16px;  
    position:sticky;  
    top:0;  
    z-index:50;  
    box-shadow:0 2px 8px rgba(0,0,0,0.5);  
  }  
  
  header .left {  
    display:flex;  
    align-items:center;  
    gap:12px;  
  }  
  
  header img.nfl {  
    height:48px;  
    filter: drop-shadow(2px 2px 4px #000);  
  }  
  
  header .right {  
  display:flex;  
  align-items:center;  
  gap:10px;  
  flex-wrap:wrap;         /* 📌 Hace que no se salgan si falta espacio */  
  justify-content:flex-end;  
  max-width:70%;          /* 📌 Evita que los botones empujen la barra */  
}  
  
header button,  
header select {  
  padding:6px 12px;  
  border-radius:6px;  
  border:none;  
  font-size:14px;  
  white-space:nowrap;     /* 📌 No se rompen los botones en 2 líneas */  
}  
  
  header select,  
  header button {  
    padding:6px 10px;  
    border-radius:6px;  
    border:none;  
    font-size:15px;  
  }  
  
  header button {  
    background:#fff;  
    color:#000;  
    cursor:pointer;  
  }  
  
  #descargarImg {  
    background:#0d0d0d;  
    color:#fff;  
    border:2px solid #fff;  
    font-weight:bold;  
  }  
  
  .aciertos {  
    background: rgba(255,255,255,0.18);  
    padding:6px 10px;  
    border-radius:8px;  
    font-weight:700;  
  }  
  
  main {  
    max-width:900px;  
    margin:18px auto;  
    padding:10px;  
    box-sizing:border-box;  
  }  
  
  /* ░░░ JUEGOS ░░░ */  
  .juego {  
    background: var(--panel);  
    border:1px solid #404040;  
    border-radius:10px;  
    padding:12px;  
    margin-bottom:12px;  
    display:flex;  
    flex-direction:column;  
    gap:12px;  
  }  
  
  /* ░░░ Equipos en HORIZONTAL ░░░ */  
  .equipos {  
    display:flex;  
    justify-content:space-between;  
    align-items:center;  
    gap:12px;  
    flex-wrap:nowrap;  
  }  
  
  .equipo {  
    width:42%;  
    display:flex;  
    flex-direction:column;  
    align-items:center;  
    position:relative;  
    gap:6px;  
  }  
  
  .selector-equipo {  
    background:#3a3a3a;  
    color:#fff;  
    border:1px solid #555;  
    padding:6px 10px;  
    border-radius:6px;  
    cursor:pointer;  
  }  
  
  .nombre-equipo {  
    min-height:60px;  
    display:flex;  
    align-items:center;  
    justify-content:center;  
  }  
  
  .nombre-equipo img.logo {  
    width:64px;  
    height:64px;  
    object-fit:contain;  
    filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.7));  
  }  
  
  /* ░░░ MENU desplegable ░░░ */  
  .menu-equipos {  
    display:none;  
    position:absolute;  
    top:46px;  
    left:0;  
    background:#272727;  
    border:1px solid #444;  
    width:220px;  
    max-height:220px;  
    overflow:auto;  
    border-radius:8px;  
    padding:6px 4px;  
    z-index:60;  
  }  
  
  .menu-equipos.activo {  
    display:block;  
  }  
  
  .item-equipo {  
    padding:8px 10px;  
    cursor:pointer;  
    color:#e6e6e6;  
    border-radius:6px;  
  }  
  
  .item-equipo:hover {  
    background: rgba(255,255,255,0.05);  
  }  
  
  /* ░░░ BOTONES pick ░░░ */  
  .botones {  
    display:flex;  
    justify-content:center;  
    gap:8px;  
    margin-top:6px;  
  }  
  
  .botones button {  
    background:#3a3a3a;  
    color:#fff;  
    border:1px solid #666;  
    padding:8px 10px;  
    border-radius:8px;  
    cursor:pointer;  
    min-width:100px;  
  }  
  
  .botones button.activo {  
    background:#0055a4;  
    border:2px solid var(--accent2);  
    font-weight:700;  
  }  
  
  /* ░░░ GANADOR REAL ░░░ */  
  .ganador {  
    display:flex;  
    justify-content:center;  
    margin-top:8px;  
  }  
  
  .ganador select {  
    padding:6px 8px;  
    border-radius:6px;  
    background:#3a3a3a;  
    border:1px solid #555;  
    color:#fff;  
  }  
  
  /* ░░░ BLOQUEO ░░░ */  
  .locked {  
    opacity:0.6;  
    pointer-events:none;  
  }  
  
  .locked .ganador {  
    pointer-events:auto;  
    opacity:1;  
  } 
    
  .live-indicator{  
  color:#ff3b3b;  
  font-weight:bold;  
  animation:parpadeo 1s infinite;  
}  
  
@keyframes parpadeo{  
  0%{opacity:1;}  
  50%{opacity:0.3;}  
  100%{opacity:1;}  
}  
    
</style>  </head>  <body>  <header>  
  <div class="left">  
    <img class="nfl" src="https://upload.wikimedia.org/wikipedia/en/a/a2/National_Football_League_logo.svg" />  
    <strong style="font-size:18px">Picks Semanal</strong>  
  </div>  
  <div class="right">  
    <select id="semana"></select>  
    <span class="aciertos" id="aciertos">Aciertos: 0</span>  
    <button onclick="reiniciar()">Reiniciar</button>  
    <button id="bloquearBtn" onclick="bloquear()">Bloquear</button>  
    <button id="descargarImg">Descargar</button>  
  </div>  
</header>  <main id="contenedor"></main>  
  <script>  /* --------------------
Datos iniciales
-------------------- */

let bloqueo = JSON.parse(localStorage.getItem("bloqueo")) || false;

const contenedor = document.getElementById("contenedor");
const semanaSelect = document.getElementById("semana");
const aciertosDisplay = document.getElementById("aciertos");

/* semanas */
for(let s=1;s<=18;s++){
const o=document.createElement("option");
o.value=s;
o.textContent="Semana "+s;
semanaSelect.appendChild(o);
}

semanaSelect.value = localStorage.getItem("semanaActual") || 1;
semanaSelect.addEventListener("change", () => {

  localStorage.setItem("semanaActual", semanaSelect.value);

  crearJuegos();

  ponerEquiposReales();

  calcularAciertos();

});
  
/* --------------------
CREAR JUEGOS
-------------------- */

function crearJuegos(){

contenedor.innerHTML="";

const semana = semanaSelect.value;
const guardado = JSON.parse(localStorage.getItem("semana"+semana)) || [];

for(let i=1;i<=16;i++){

const juego=document.createElement("div");  
juego.className="juego";  

juego.innerHTML=`  
<div style="font-weight:700">Juego ${i}</div>  

<div class="equipos">  

  <div class="equipo visitante">  
    <div class="nombre-equipo"></div>  
  </div>  

  <div style="font-weight:700;color:#aaa">VS</div>  

  <div class="equipo local">  
    <div class="nombre-equipo"></div>  
  </div>  

</div>  

<div class="botones">  
  <button class="btnVisitante">Visitante</button>  
  <button class="btnEmpate">Empate</button>  
  <button class="btnLocal">Local</button>
  
</div>  

<div class="marcador" style="text-align:center;margin-top:4px;">-</div>  

<div class="drive" style="text-align:center;font-size:12px;color:#aaa"></div>  

<div class="ganador">  
  <select class="ganador-select">  
    <option value="">Ganador real</option>  
  </select>  
</div>  
`;  

contenedor.appendChild(juego);  

const btnVis=juego.querySelector(".btnVisitante");  
const btnLoc=juego.querySelector(".btnLocal");  
const btnEmp=juego.querySelector(".btnEmpate");  
console.log("Botones juego", i, btnLoc, btnVis, btnEmp);
const selGan=juego.querySelector(".ganador-select");  

const datos = guardado[i-1] || {};  

if(datos.pick){  

  if(datos.pick==="Local") btnLoc.classList.add("activo");  
  if(datos.pick==="Visitante") btnVis.classList.add("activo");  
  if(datos.pick==="Empate") btnEmp.classList.add("activo");  

}  

function guardarPick(p){  

  const dataSemana = JSON.parse(localStorage.getItem("semana"+semana)) || [];  

  dataSemana[i-1] = {  

    ...dataSemana[i-1],  
    pick:p  

  };  

  localStorage.setItem("semana"+semana,JSON.stringify(dataSemana));  

  calcularAciertos();  

}  

btnLoc.addEventListener("click", () => {
  if(!bloqueo){
    guardarPick("Local");
    btnLoc.classList.add("activo");
    btnVis.classList.remove("activo");
    btnEmp.classList.remove("activo");
  }
});

btnVis.addEventListener("click", () => {
  if(!bloqueo){
    guardarPick("Visitante");
    btnVis.classList.add("activo");
    btnLoc.classList.remove("activo");
    btnEmp.classList.remove("activo");
  }
});

btnEmp.addEventListener("click", () => {
  if(!bloqueo){
    guardarPick("Empate");
    btnEmp.classList.add("activo");
    btnVis.classList.remove("activo");
    btnLoc.classList.remove("activo");
  }
});
  
selGan.onchange=()=>{  

  const dataSemana = JSON.parse(localStorage.getItem("semana"+semana)) || [];  

  dataSemana[i-1]={  

    ...dataSemana[i-1],  
    ganador:selGan.value  

  };  

  localStorage.setItem("semana"+semana,JSON.stringify(dataSemana));  

  calcularAciertos();  

};

}

}

/* --------------------
CALCULAR ACIERTOS
-------------------- */

function calcularAciertos() {
  const semana = semanaSelect.value;
  const datos = JSON.parse(localStorage.getItem("semana" + semana)) || [];

  let aciertos = 0;

  datos.forEach(j => {
    if (!j) return;

    // ✅ Solo contar 1 acierto por juego
    if (j.pick && j.ganador) {
      // Si el pick coincide con el ganador, suma 1
      if (j.pick === j.ganador) {
        aciertos++;
      }
    }
  });

  // Actualizar display
  aciertosDisplay.textContent = "Aciertos: " + aciertos;
}

/* --------------------
ESPN API
-------------------- */

async function obtenerJuegosSemana(){

try{

const res = await fetch(  
"https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?week="+semanaSelect.value  
);  

const data = await res.json();  

return data.events;

}catch(e){

console.log("Error ESPN");  

return [];

}

}

async function obtenerDrive(id){

try{

const res = await fetch(  
"https://site.api.espn.com/apis/site/v2/sports/football/nfl/summary?event="+id  
);  

const data = await res.json();  

return data;

}catch(e){

return null;

}

}

/* --------------------
CARGAR JUEGOS ESPN
-------------------- */

async function ponerEquiposReales() {

  const juegosESPN = await obtenerJuegosSemana();
  const juegosPagina = document.querySelectorAll(".juego");
  const semana = semanaSelect.value;
  const dataSemana = JSON.parse(localStorage.getItem("semana" + semana)) || [];

  juegosESPN.forEach(async (evento, i) => {
    if (!juegosPagina[i]) return;

    const comp = evento.competitions[0];
    const local = comp.competitors.find(t => t.homeAway === "home");
    const visitante = comp.competitors.find(t => t.homeAway === "away");

    const visDiv = juegosPagina[i].querySelector(".visitante .nombre-equipo");
    const locDiv = juegosPagina[i].querySelector(".local .nombre-equipo");
    const marcador = juegosPagina[i].querySelector(".marcador");
    const driveDiv = juegosPagina[i].querySelector(".drive");

    // ─── Actualizar logos SIN tocar botones ───
    let imgVis = visDiv.querySelector("img");
    if (!imgVis) {
      imgVis = document.createElement("img");
      imgVis.className = "logo";
      imgVis.width = 64;
      visDiv.appendChild(imgVis);
    }
    imgVis.src = visitante.team.abbreviation + ".png";

let imgLoc = locDiv.querySelector("img");
if (!imgLoc) {
  imgLoc = document.createElement("img");
  imgLoc.className = "logo";
  imgLoc.width = 64;
  locDiv.appendChild(imgLoc);
}
imgLoc.src = local.team.abbreviation + ".png";

    // ─── Actualizar marcador y estado ───
    const scoreVis = Number(visitante.score) || 0;
    const scoreLoc = Number(local.score) || 0;
    const estado = comp.status.type.description;
    const reloj = comp.status.displayClock;
    const periodo = comp.status.period;

    let live = "";
    if (comp.status.type.state === "in") {
      live = '<span class="live-indicator">🔴 LIVE</span>';
    }

    marcador.innerHTML = `
      ${live}
      ${visitante.team.abbreviation} ${scoreVis} - ${scoreLoc} ${local.team.abbreviation}
      <br>Q${periodo} • ${reloj}
    `;

    // ─── PARTIDO FINAL ───
    if (comp.status.type.completed) {
      let ganador = "";
      if (scoreLoc > scoreVis) ganador = "Local";
      else if (scoreVis > scoreLoc) ganador = "Visitante";
      else ganador = "Empate"; // ← ahora el empate se reconoce

      dataSemana[i] = {
        ...dataSemana[i],
        local: local.team.abbreviation,
        visitante: visitante.team.abbreviation,
        ganador: ganador
      };
      localStorage.setItem("semana" + semana, JSON.stringify(dataSemana));
      calcularAciertos();

      marcador.innerHTML += "<br><strong>Final</strong>";
    }

    // ─── Mostrar drive en vivo si existe ───
    const resumen = await obtenerDrive(evento.id);
    if (resumen && resumen.drives && resumen.drives.current) {
      const drive = resumen.drives.current;
      const equipo = drive.team?.abbreviation || "";
      const down = drive.start?.downDistanceText || "";
      driveDiv.innerHTML = `🏈 ${equipo} ball<br>${down}`;
    }

  });
}

/* --------------------
BLOQUEO
-------------------- */

function aplicarBloqueo(){

document.querySelectorAll(".juego").forEach(j=>{

if(bloqueo){  

  j.classList.add("locked");  

}else{  

  j.classList.remove("locked");  

}

});

}
  
  function reiniciar() {
  const semana = semanaSelect.value;
  bloqueo = false;  // 🔹 desbloquear los botones
  localStorage.removeItem("semana"+semana); // borra los picks de la semana actual
  crearJuegos();
  ponerEquiposReales();
  calcularAciertos();
  aplicarBloqueo(); // 🔹 actualizar clases CSS según bloqueo

}
  
function bloquear() {
  bloqueo = true; // solo bloquea
  localStorage.setItem("bloqueo", JSON.stringify(bloqueo));
  aplicarBloqueo();

  // Opcional: desactivar el botón para que no se pueda hacer clic otra vez
  const btn = document.getElementById("bloquearBtn");
  btn.disabled = true;
  btn.style.opacity = 0.6;
  btn.style.cursor = "not-allowed";
}
  
/* --------------------
INICIO
-------------------- */

crearJuegos();

ponerEquiposReales();

setInterval(ponerEquiposReales,30000);

calcularAciertos();

aplicarBloqueo();

// --------------------
// DESCARGAR IMAGEN
// --------------------
document.getElementById("descargarImg").addEventListener("click", () => {
  html2canvas(document.querySelector("main")).then(canvas => {
    const link = document.createElement("a");
    link.download = `picks_semana${semanaSelect.value}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
});
    
</script>

  <!-- html2canvas -->  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>  </body>  
</html>
