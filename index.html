<head>

<title>Picks NFL — Semanal</title>  <style>

  <div class="left">  
    <img class="nfl" src="https://upload.wikimedia.org/wikipedia/en/a/a2/National_Football_League_logo.svg" />

  <script>  /* --------------------
Datos iniciales
-------------------- */

let bloqueo = JSON.parse(localStorage.getItem("bloqueo")) || false;

const contenedor = document.getElementById("contenedor");
const semanaSelect = document.getElementById("semana");
const aciertosDisplay = document.getElementById("aciertos");

/* semanas */
for(let s=1;s<=18;s++){
const o=document.createElement("option");
o.value=s;
o.textContent="Semana "+s;
semanaSelect.appendChild(o);
}

semanaSelect.value = localStorage.getItem("semanaActual") || 1;
semanaSelect.addEventListener("change", () => {

  localStorage.setItem("semanaActual", semanaSelect.value);

  crearJuegos();
  ponerEquiposReales();
  calcularAciertos();

  // 🔥 AGREGAR ESTO
  if(vistaActual === "live"){
    cargarVistaTiempoReal();
  }

});
  
/* --------------------
CREAR JUEGOS
-------------------- */

function crearJuegos(){

contenedor.innerHTML="";

const semana = semanaSelect.value;
const guardado = JSON.parse(localStorage.getItem("semana"+semana)) || [];

for(let i=1;i<=16;i++){

const juego=document.createElement("div");  
juego.className="juego";  

juego.innerHTML=`  
<div style="font-weight:700">Juego ${i}</div>  

<div class="equipos">  

  <div class="equipo visitante">  
    <div class="nombre-equipo"></div>  
  </div>  

  <div style="font-weight:700;color:#aaa">VS</div>  

  <div class="equipo local">  
    <div class="nombre-equipo"></div>  
  </div>  

</div>  

<div class="botones">  
  <button class="btnVisitante">Visitante</button>  
  <button class="btnEmpate">Empate</button>  
  <button class="btnLocal">Local</button>
  
</div>  

<div class="marcador" style="text-align:center;margin-top:4px;">-</div>  

<div class="drive" style="text-align:center;font-size:12px;color:#aaa"></div>  

<div class="ganador">  
  <select class="ganador-select">  
    <option value="">Ganador real</option>  
  </select>  
</div>  
`;  

contenedor.appendChild(juego);  

const btnVis=juego.querySelector(".btnVisitante");  
const btnLoc=juego.querySelector(".btnLocal");  
const btnEmp=juego.querySelector(".btnEmpate");  
console.log("Botones juego", i, btnLoc, btnVis, btnEmp);
const selGan=juego.querySelector(".ganador-select");  

const datos = guardado[i-1] || {};  

if(datos.pick){  

  if(datos.pick==="Local") btnLoc.classList.add("activo");  
  if(datos.pick==="Visitante") btnVis.classList.add("activo");  
  if(datos.pick==="Empate") btnEmp.classList.add("activo");  

}  

function guardarPick(p){  

  const dataSemana = JSON.parse(localStorage.getItem("semana"+semana)) || [];  

  dataSemana[i-1] = {  

    ...dataSemana[i-1],  
    pick:p  

  };  

  localStorage.setItem("semana"+semana,JSON.stringify(dataSemana));  

  calcularAciertos();  

}  

btnLoc.addEventListener("click", () => {
  if(!bloqueo){
    guardarPick("Local");
    btnLoc.classList.add("activo");
    btnVis.classList.remove("activo");
    btnEmp.classList.remove("activo");
  }
});

btnVis.addEventListener("click", () => {
  if(!bloqueo){
    guardarPick("Visitante");
    btnVis.classList.add("activo");
    btnLoc.classList.remove("activo");
    btnEmp.classList.remove("activo");
  }
});

btnEmp.addEventListener("click", () => {
  if(!bloqueo){
    guardarPick("Empate");
    btnEmp.classList.add("activo");
    btnVis.classList.remove("activo");
    btnLoc.classList.remove("activo");
  }
});
  
selGan.onchange=()=>{  

  const dataSemana = JSON.parse(localStorage.getItem("semana"+semana)) || [];  

  dataSemana[i-1]={  

    ...dataSemana[i-1],  
    ganador:selGan.value  

  };  

  localStorage.setItem("semana"+semana,JSON.stringify(dataSemana));  

  calcularAciertos();  

};

}

}

/* --------------------
CALCULAR ACIERTOS
-------------------- */

function calcularAciertos() {
  const semana = semanaSelect.value;
  const datos = JSON.parse(localStorage.getItem("semana" + semana)) || [];

  let aciertos = 0;

  datos.forEach(j => {
    if (!j) return;

    // ✅ Solo contar 1 acierto por juego
    if (j.pick && j.ganador) {
      // Si el pick coincide con el ganador, suma 1
      if (j.pick === j.ganador) {
        aciertos++;
      }
    }
  });

  // Actualizar display
  aciertosDisplay.textContent = "Aciertos: " + aciertos;
}

/* --------------------
ESPN API
-------------------- */

async function obtenerJuegosSemana(){

try{

const res = await fetch(  
"https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?week="+semanaSelect.value  
);  

const data = await res.json();  

return data.events;

}catch(e){

console.log("Error ESPN");  

return [];

}

}

async function obtenerDrive(id){

try{

const res = await fetch(  
"https://site.api.espn.com/apis/site/v2/sports/football/nfl/summary?event="+id  
);  

const data = await res.json();  

return data;

}catch(e){

return null;

}

}

/* --------------------
CARGAR JUEGOS ESPN
-------------------- */

async function ponerEquiposReales() {

  const juegosESPN = await obtenerJuegosSemana();
  const juegosPagina = document.querySelectorAll(".juego");
  const semana = semanaSelect.value;
  const dataSemana = JSON.parse(localStorage.getItem("semana" + semana)) || [];

  juegosESPN.forEach(async (evento, i) => {
    if (!juegosPagina[i]) return;

    const comp = evento.competitions[0];
    const local = comp.competitors.find(t => t.homeAway === "home");
    const visitante = comp.competitors.find(t => t.homeAway === "away");

    const visDiv = juegosPagina[i].querySelector(".visitante .nombre-equipo");
    const locDiv = juegosPagina[i].querySelector(".local .nombre-equipo");
    const marcador = juegosPagina[i].querySelector(".marcador");
    const driveDiv = juegosPagina[i].querySelector(".drive");

    // ─── Actualizar logos SIN tocar botones ───
    let imgVis = visDiv.querySelector("img");
    if (!imgVis) {
      imgVis = document.createElement("img");
      imgVis.className = "logo";
      imgVis.width = 64;
      visDiv.appendChild(imgVis);
    }
    imgVis.src = visitante.team.abbreviation + ".png";

let imgLoc = locDiv.querySelector("img");
if (!imgLoc) {
  imgLoc = document.createElement("img");
  imgLoc.className = "logo";
  imgLoc.width = 64;
  locDiv.appendChild(imgLoc);
}
imgLoc.src = local.team.abbreviation + ".png";

    // ─── Actualizar marcador y estado ───
    const scoreVis = Number(visitante.score) || 0;
    const scoreLoc = Number(local.score) || 0;
    const estado = comp.status.type.description;
    const reloj = comp.status.displayClock;
    const periodo = comp.status.period;

    let live = "";
    if (comp.status.type.state === "in") {
      live = '<span class="live-indicator">🔴 LIVE</span>';
    }

    marcador.innerHTML = `
      ${live}
      ${visitante.team.abbreviation} ${scoreVis} - ${scoreLoc} ${local.team.abbreviation}
      <br>Q${periodo} • ${reloj}
    `;

    // ─── PARTIDO FINAL ───
    if (comp.status.type.completed) {
      let ganador = "";
      if (scoreLoc > scoreVis) ganador = "Local";
      else if (scoreVis > scoreLoc) ganador = "Visitante";
      else ganador = "Empate"; // ← ahora el empate se reconoce

      dataSemana[i] = {
        ...dataSemana[i],
        local: local.team.abbreviation,
        visitante: visitante.team.abbreviation,
        ganador: ganador
      };
      localStorage.setItem("semana" + semana, JSON.stringify(dataSemana));
      calcularAciertos();

      marcador.innerHTML += "<br><strong>Final</strong>";
    }

    // ─── Mostrar drive en vivo si existe ───
    const resumen = await obtenerDrive(evento.id);
    if (resumen && resumen.drives && resumen.drives.current) {
      const drive = resumen.drives.current;
      const equipo = drive.team?.abbreviation || "";
      const down = drive.start?.downDistanceText || "";
      driveDiv.innerHTML = `🏈 ${equipo} ball<br>${down}`;
    }

  });
}

/* --------------------
BLOQUEO
-------------------- */

function aplicarBloqueo(){

  document.querySelectorAll(".juego").forEach(j=>{

    if(bloqueo){  
      j.classList.add("locked");  
    }else{  
      j.classList.remove("locked");  
    }

  });

  // 🔥 sincronizar botón SIEMPRE
  const btn = document.getElementById("bloquearBtn");

  if(bloqueo){
    btn.textContent = "Desbloquear";
    btn.style.opacity = 0.6;
  }else{
    btn.textContent = "Bloquear";
    btn.style.opacity = 1;
  }
}
  
function reiniciar() {
  const semana = semanaSelect.value;

  bloqueo = false;

  // 🔥 limpiar datos
  localStorage.removeItem("semana"+semana);
  localStorage.removeItem("bloqueo");

  crearJuegos();
  ponerEquiposReales();
  calcularAciertos();
  aplicarBloqueo();

  // 🔥 REACTIVAR BOTÓN
  const btn = document.getElementById("bloquearBtn");

btn.disabled = false;
btn.style.opacity = 1;
btn.style.cursor = "pointer";
btn.textContent = "Bloquear";
}
  
function bloquear() {
  bloqueo = true; // 🔥 SIEMPRE se bloquea

  localStorage.setItem("bloqueo", JSON.stringify(bloqueo));

  aplicarBloqueo();

  const btn = document.getElementById("bloquearBtn");

  // 🔒 desactivar botón para que no se vuelva a usar
  btn.disabled = true;
  btn.style.opacity = 0.6;
  btn.style.cursor = "not-allowed";
  btn.textContent = "Bloqueado";
}

let vistaActual = "picks";

function cambiarVista(){

  const picks = document.getElementById("contenedor");
  const live = document.getElementById("vistaTiempoReal");
  const btn = document.getElementById("btnVista");

  if(vistaActual === "picks"){

    picks.style.display = "none";
    live.style.display = "block";
cargarVistaTiempoReal();
    btn.textContent = "Ver Picks";

    vistaActual = "live";

  }else{

    picks.style.display = "block";
    live.style.display = "none";

    btn.textContent = "Modo tiempo real";

    vistaActual = "picks";
  }
}
  
  function crearCampo(yarda, idJuego, firstDown = null){

  const pos = (yarda / 100) * 100;

  const posFirst = firstDown !== null ? (firstDown / 100) * 100 : null;

  return `
    <div style="position:relative;width:100%;height:100px;background:#0a5c2f;border-radius:6px;overflow:hidden">

      <!-- líneas de yardas -->
      ${[10,20,30,40,50,60,70,80,90].map(y=>`
        <div style="
          position:absolute;
          left:${y}%;
          top:0;
          bottom:0;
          width:2px;
          background:rgba(255,255,255,0.2);
        "></div>
      `).join("")}

      <!-- 🔵 línea de scrimmage -->
      <div id="scrimmage-${idJuego}" style="
        position:absolute;
        left:${pos}%;
        top:0;
        bottom:0;
        width:3px;
        background:#00aaff;
        box-shadow:0 0 6px #00aaff;
      "></div>

      <!-- 🟡 línea de first down -->
      ${firstDown !== null ? `
        <div id="first-${idJuego}" style="
          position:absolute;
          left:${posFirst}%;
          top:0;
          bottom:0;
          width:3px;
          background:yellow;
          box-shadow:0 0 6px yellow;
        "></div>
      ` : ""}

      <!-- 🏈 balón -->
      <div id="balon-${idJuego}" style="
        position:absolute;
        left:${pos}%;
        top:50%;
        transform:translate(-50%,-50%);
        transition:left 0.6s ease;
        font-size:18px;
      ">🏈</div>

    </div>
  `;
}
  
  async function cargarVistaTiempoReal(){

  const vista = document.getElementById("vistaTiempoReal");

  vista.innerHTML = "<h2>Tiempo Real</h2>";

  const juegos = await obtenerJuegosSemana();

  juegos.forEach((game, i)=>{

  const comp = game.competitions[0];
  const situ = comp.situation || {};
  let firstDownYard = null;

if(situ.downDistanceText){
  const partes = situ.downDistanceText.split("&");
  
  if(partes.length > 1){
    const distancia = parseInt(partes[1]);
    
    if(!isNaN(distancia)){
      firstDownYard = (situ.yardLine || 50) + distancia;
    }
  }
}
  const down = situ.downDistanceText || "";
  const equipo = situ.possession || "";
  const yard = situ.yardLine || 50;
const possession = situ.possession || "";

// detectar equipos
const compo = game.competitions[0];
const local = compo.competitors.find(t => t.homeAway === "home");
const visitante = compo.competitors.find(t => t.homeAway === "away");

// invertir si el balón es del visitante
let yardaFinal = yard;



  // 🔄 Si ya existe → mover balón
  if(document.getElementById(`balon-${i}`)){

  moverBalon(i, yardaFinal);

  // 🔵 mover línea de scrimmage
  const scrimmage = document.getElementById(`scrimmage-${i}`);
  if(scrimmage){
    scrimmage.style.left = (yardaFinal) + "%";
  }

  // 🟡 mover línea de first down
  const first = document.getElementById(`first-${i}`);
  if(first && firstDownYard !== null){
    first.style.left = (firstDownYard) + "%";
  }

  return;
}

  // 🆕 Si no existe → crear campo
  vista.innerHTML += `
  <div class="juego">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">

      <div style="text-align:center">
        <img src="${visitante.team.abbreviation}.png" width="60">
        <div style="font-size:11px;color:${possession === visitante.team.abbreviation ? '#0f0' : '#aaa'}">
          ${possession === visitante.team.abbreviation ? "🏈" : ""}
        </div>
      </div>

      <div style="font-weight:700">${game.shortName.replace("@", "   vs   ")}</div>

      <div style="text-align:center">
        <img src="${local.team.abbreviation}.png" width="60">
        <div style="font-size:11px;color:${possession === local.team.abbreviation ? '#0f0' : '#aaa'}">
          ${possession === local.team.abbreviation ? "🏈" : ""}
        </div>
      </div>

    </div>

    ${crearCampo(yardaFinal, i, firstDownYard)}

    <div style="text-align:center;font-size:12px;color:#aaa">
      ${situ.downDistanceText || ""}
    </div>

  </div>
`;
});
}
  
  function moverBalon(idJuego, nuevaYarda){

  const balon = document.getElementById(`balon-${idJuego}`);
  if(!balon) return;

  const nuevaPos = (nuevaYarda / 100) * 100;

  balon.style.transition = "left 0.6s ease"; // 🔥 animación suave
  balon.style.left = nuevaPos + "%";
}

INICIO
